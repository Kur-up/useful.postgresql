# PgBouncer HBA (Host-Based Authentication) file.
# Format is identical to PostgreSQL pg_hba.conf.
# Changes take effect after restarting PgBouncer: docker compose restart pgbouncer
#
# Columns: TYPE  DATABASE  USER  ADDRESS  METHOD
#
# TYPE:
#   local  — Unix socket connections (disabled here, see unix_socket_dir =)
#   host   — TCP connections (plain or TLS)
#
# DATABASE / USER: specific name or "all"
#
# ADDRESS: CIDR notation
#   0.0.0.0/0   — all IPv4
#   ::/0        — all IPv6
#   10.0.0.1/32 — single host
#
# METHOD: scram-sha-256 | md5 | trust | reject
#
# Rules are evaluated top-to-bottom; first match wins.
# To restrict by IP — replace the 0.0.0.0/0 lines with specific subnets:
#   host  all  all  10.0.0.1/32  scram-sha-256
# ---------------------------------------------------------------------------

# Allow all IPv4 connections
host    all     all     0.0.0.0/0       scram-sha-256

# Allow all IPv6 connections
host    all     all     ::/0            scram-sha-256
