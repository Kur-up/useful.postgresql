# =============================================================================
# Connection
# =============================================================================
listen_addresses = '*'          # listen on all interfaces (network isolation via Docker)
port             = 5432
max_connections  = 100          # keep low — PgBouncer multiplexes client connections

# =============================================================================
# Memory
# Tune for available RAM. A common baseline:
#   shared_buffers         = 25% of RAM
#   effective_cache_size   = 75% of RAM
#   work_mem               = RAM / (max_connections * 2)
#   maintenance_work_mem   = 5–10% of RAM
# =============================================================================
shared_buffers            = 512MB     # also set shm_size in docker-compose.yml
effective_cache_size      = 1536MB
work_mem                  = 16MB
maintenance_work_mem      = 128MB

# =============================================================================
# WAL / Durability
# =============================================================================
wal_level                      = replica        # required for logical/physical replication
wal_compression                = on             # saves disk I/O, minor CPU cost
max_wal_size                   = 2GB
min_wal_size                   = 256MB
checkpoint_completion_target   = 0.9            # spread checkpoint I/O over 90% of the interval
synchronous_commit             = on             # fsync on commit; set to 'off' only for high-write workloads where data loss is acceptable

# =============================================================================
# Parallelism
# Set to number of available CPU cores (or half for mixed workloads)
# =============================================================================
max_worker_processes             = 4
max_parallel_workers_per_gather  = 2
max_parallel_workers             = 4
max_parallel_maintenance_workers = 2

# =============================================================================
# I/O
# random_page_cost = 1.1 is optimal for SSD/NVMe (default 4.0 is for HDD)
# =============================================================================
random_page_cost         = 1.1
effective_io_concurrency = 200

# =============================================================================
# Logging
# =============================================================================
log_timezone                = 'UTC'
log_line_prefix             = '%m [%p] %q%u@%d '
log_checkpoints             = on
log_connections             = off   # enable only for debugging; very verbose in production
log_disconnections          = off
log_lock_waits              = on
log_temp_files              = 0     # log all temp files (0 = log all, -1 = disable)
log_autovacuum_min_duration = 250ms
log_min_duration_statement  = 1000  # log queries slower than 1s (milliseconds)

# =============================================================================
# Autovacuum
# =============================================================================
autovacuum                   = on
autovacuum_max_workers       = 3
autovacuum_naptime           = 1min
autovacuum_vacuum_cost_delay = 2ms  # throttle vacuum I/O impact

# =============================================================================
# Locale / Format
# =============================================================================
datestyle                  = 'iso, dmy'
timezone                   = 'UTC'
lc_messages                = 'en_US.utf8'
lc_monetary                = 'en_US.utf8'
lc_numeric                 = 'en_US.utf8'
lc_time                    = 'en_US.utf8'
default_text_search_config = 'pg_catalog.english'

# =============================================================================
# Security
# =============================================================================
password_encryption = scram-sha-256  # must match the METHOD in configs/pgbouncer/hba.conf
row_security        = on
