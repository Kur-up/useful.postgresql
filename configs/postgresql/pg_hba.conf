# TYPE  DATABASE  USER      ADDRESS         METHOD
#
# Local Unix socket connections
local   all       postgres                  peer           # OS-level superuser via unix socket
local   all       all                       scram-sha-256  # all other local users

# IPv4 loopback
host    all       all       127.0.0.1/32    scram-sha-256

# IPv6 loopback
host    all       all       ::1/128         scram-sha-256

# All remote hosts (Docker internal network + PgBouncer)
# Network isolation is enforced by Docker (internal: true network).
host    all       all       0.0.0.0/0       scram-sha-256
